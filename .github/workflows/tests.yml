name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: academia
        ports:
          - 5432:5432
        # Garante que o Actions espera o Postgres ficar pronto antes de seguir
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: academia
      DB_USER: postgres
      DB_PASSWORD: postgres
      SECRET_KEY: chave-secreta-apenas-para-ci
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123

    steps:
      - name: Checkout do código (academia-api)
        uses: actions/checkout@v4

      - name: Clonar repositório do schema (Academia)
        run: git clone https://github.com/ThiagoKleinn/Academia.git academia-schema

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Criar schema do banco
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d academia -f academia-schema/schema.sql

      - name: Criar usuário admin (seed)
        run: python seed.py

      - name: Rodar testes
        run: pytest tests/ -v